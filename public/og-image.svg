<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/>
      <stop offset="50%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle circle decorations -->
  <circle cx="100" cy="100" r="180" fill="#c4b5fd" opacity="0.15"/>
  <circle cx="1100" cy="530" r="220" fill="#f9a8d4" opacity="0.15"/>
  <circle cx="1050" cy="80" r="120" fill="#a78bfa" opacity="0.1"/>
  <circle cx="150" cy="560" r="100" fill="#f472b6" opacity="0.1"/>

  <!-- Heart icon -->
  <g transform="translate(520, 160)">
    <path d="M80 30 C80 10 60 0 40 0 C20 0 0 10 0 30 C0 50 40 80 40 80 C40 80 80 50 80 30Z" fill="url(#heart)" transform="scale(2) translate(-40, -20)"/>
  </g>

  <!-- Tether wordmark -->
  <text x="600" y="370" font-family="Georgia, serif" font-size="96" font-weight="bold" fill="#5b21b6" text-anchor="middle" letter-spacing="-2">Tether</text>

  <!-- Tagline -->
  <text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" fill="#7c3aed" text-anchor="middle" opacity="0.8">A private space for you and your partner</text>

  <!-- Sub tagline -->
  <text x="600" y="490" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#9f7aea" text-anchor="middle" opacity="0.6">Mood check-ins · Shared chat · Relationship insights</text>

  <!-- Bottom URL -->
  <text x="600" y="570" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#a78bfa" text-anchor="middle" opacity="0.5">tether.agoyal.dev</text>
</svg>
